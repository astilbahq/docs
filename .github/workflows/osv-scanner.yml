name: OSV-Scanner

on:
  pull_request:
  schedule:
    - cron: "14 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: osv-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osv-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Scan complete lockfile
        uses: docker://ghcr.io/google/osv-scanner:v2.4.0@sha256:5116601dedc01c1c580eb92371883ec052fc4c13c3fbc109d621a63ac416d475
        with:
          args: scan source -L pnpm-lock.yaml
