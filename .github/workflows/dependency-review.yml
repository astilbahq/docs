name: Dependency review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect dependency baseline
        id: baseline
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if git cat-file -e "${BASE_SHA}:pnpm-lock.yaml"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Dependency review starts after the default branch contains pnpm-lock.yaml."
          fi

      - name: Review dependency changes
        if: steps.baseline.outputs.available == 'true'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: never
