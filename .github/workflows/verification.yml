name: Verification

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      production-artifact-digest: ${{ steps.upload-production.outputs.artifact-digest }}
      production-artifact-id: ${{ steps.upload-production.outputs.artifact-id }}
    concurrency:
      group: verification-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Panda bindings
        run: pnpm panda:codegen

      - name: Check Astro and TypeScript
        run: pnpm check

      - name: Run unit tests
        run: pnpm test

      - name: Find unused code and dependencies
        run: pnpm knip

      - name: Build and validate deployment
        run: pnpm deploy:dry-run

      - name: Cache Playwright browser
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Chromium
        run: pnpm test:browser:install:ci

      - name: Run browser and accessibility tests
        run: pnpm test:browser:run

      - name: Upload verified production artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: upload-production
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Deploy production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://docs.astilba.com
    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - name: Check out verified revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download verified production artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.docs.outputs.production-artifact-id }}
          path: dist
          digest-mismatch: error

      - name: Confirm artifact provenance
        env:
          ARTIFACT_DIGEST: ${{ needs.docs.outputs.production-artifact-digest }}
        run: |
          if [[ ! "$ARTIFACT_DIGEST" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::The verified production artifact is missing its SHA-256 digest."
            exit 1
          fi

          if [[ ! -f dist/index.html || ! -d dist/.well-known ]]; then
            echo "::error::The verified production artifact is incomplete."
            exit 1
          fi

          echo "Deploying verified artifact sha256:$ARTIFACT_DIGEST"

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Reject a stale main revision
        env:
          VERIFIED_SHA: ${{ github.sha }}
        run: |
          read -r current_main_sha current_main_ref < <(
            git ls-remote --exit-code origin refs/heads/main
          )

          if [[ "$current_main_ref" != "refs/heads/main" || "$current_main_sha" != "$VERIFIED_SHA" ]]; then
            echo "::error::Refusing to deploy $VERIFIED_SHA because origin/main is $current_main_sha."
            exit 1
          fi

      - name: Deploy verified site
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Smoke-test production
        run: pnpm smoke:production
