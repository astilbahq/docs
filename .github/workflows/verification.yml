name: Verification

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      docs_artifact_digest: ${{ steps.upload_docs.outputs.artifact-digest }}
      docs_artifact_id: ${{ steps.upload_docs.outputs.artifact-id }}
      site_artifact_digest: ${{ steps.upload_site.outputs.artifact-digest }}
      site_artifact_id: ${{ steps.upload_site.outputs.artifact-id }}
    concurrency:
      group: verification-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Panda bindings
        run: pnpm panda:codegen

      - name: Lint and check formatting
        run: pnpm lint

      - name: Check Astro and TypeScript
        run: pnpm check

      - name: Run unit tests
        run: pnpm test

      - name: Check apex Astro and TypeScript
        run: pnpm --dir site check

      - name: Run apex unit tests
        run: pnpm --dir site test

      - name: Find unused code and dependencies
        run: pnpm knip

      - name: Build and validate docs deployment
        run: pnpm deploy:dry-run

      - name: Build and validate apex deployment
        run: pnpm --dir site deploy:dry-run

      - name: Cache Playwright browser
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Chromium
        run: pnpm test:browser:install:ci

      - name: Run docs browser and accessibility tests
        run: pnpm test:browser:run

      - name: Run apex browser and accessibility tests
        run: pnpm --dir site test:browser

      - name: Upload verified docs artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: upload_docs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-production-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

      - name: Upload verified apex artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: upload_site
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: site-production-dist-${{ github.sha }}
          path: site/dist/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            playwright-report/
            site/playwright-report/
          retention-days: 7

  deploy:
    name: Deploy production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://astilba.com/
    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - name: Check out verified revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download verified docs artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.docs.outputs.docs_artifact_id }}
          path: dist
          digest-mismatch: error

      - name: Download verified apex artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.docs.outputs.site_artifact_id }}
          path: site/dist
          digest-mismatch: error

      - name: Confirm artifact provenance
        env:
          DOCS_ARTIFACT_DIGEST: ${{ needs.docs.outputs.docs_artifact_digest }}
          SITE_ARTIFACT_DIGEST: ${{ needs.docs.outputs.site_artifact_digest }}
        run: |
          if [[ ! "$DOCS_ARTIFACT_DIGEST" =~ ^[0-9a-f]{64}$ || ! "$SITE_ARTIFACT_DIGEST" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::A verified production artifact is missing its SHA-256 digest."
            exit 1
          fi

          if [[ ! -f dist/_headers || ! -f dist/docs/index.html || ! -f dist/docs/sitemap.xml || ! -d dist/docs/.well-known ]]; then
            echo "::error::The verified docs artifact is incomplete."
            exit 1
          fi

          if [[ ! -f site/dist/index.html || ! -f site/dist/cache/index.html || ! -f site/dist/_headers || ! -f site/dist/sitemap.xml ]]; then
            echo "::error::The verified apex artifact is incomplete."
            exit 1
          fi

          echo "Deploying verified docs artifact sha256:$DOCS_ARTIFACT_DIGEST"
          echo "Deploying verified apex artifact sha256:$SITE_ARTIFACT_DIGEST"

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Reject a stale main revision
        env:
          VERIFIED_SHA: ${{ github.sha }}
        run: |
          read -r current_main_sha current_main_ref < <(
            git ls-remote --exit-code origin refs/heads/main
          )

          if [[ "$current_main_ref" != "refs/heads/main" || "$current_main_sha" != "$VERIFIED_SHA" ]]; then
            echo "::error::Refusing to deploy $VERIFIED_SHA because origin/main is $current_main_sha."
            exit 1
          fi

      - name: Deploy verified apex site
        working-directory: site
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Smoke-test apex site
        run: pnpm smoke:site

      - name: Deploy verified docs site
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Smoke-test complete public web
        run: pnpm smoke:all
